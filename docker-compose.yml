services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      extra_hosts:
      - "ollama:host-gateway"
    ports:
      - "3000:3000"
    environment:
      - NUXT_WS_URL=ws://app:3000/ws
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_URL=http://ollama:11434/v1
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres/${POSTGRES_DB:-ai_fantasy}
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
         condition: service_started
    networks:
      - game-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-ai_fantasy}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-ai_fantasy}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - game-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - game-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 6g
        reservations:
          memory: 2g
    networks:
      - game-network
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  ollamadata:

networks:
  game-network:
    driver: bridge
